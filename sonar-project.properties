# SonarCloud Configuration

# Project identification
sonar.projectKey=evorhard_evorbrain
sonar.organization=evorhard

# Project information
sonar.projectName=EvorBrain
sonar.projectVersion=0.1.0

# Source code configuration
sonar.sources=apps,packages
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/dist/**,**/build/**,**/.next/**,**/coverage/**,**/__tests__/**,**/*.config.js,**/*.config.ts

# Test configuration
sonar.tests=apps,packages
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/__tests__/**

# Coverage configuration
sonar.javascript.lcov.reportPaths=coverage/lcov.info
sonar.typescript.lcov.reportPaths=coverage/lcov.info

# Language-specific settings
sonar.javascript.node.maxspace=4096
sonar.typescript.tsconfigPaths=tsconfig.json,apps/*/tsconfig.json,packages/*/tsconfig.json

# Quality gate settings
sonar.qualitygate.wait=true